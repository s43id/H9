  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

:1px solid #e4e0d2;border-radius:8px;font-size:14px;font-family:'JetBrains Mono',monospace;min-height:44px;\">\n                <sc-for list=\"{{ dailyDayOptions }}\" as=\"do\" hint-placeholder-count=\"31\">\n                  <option value=\"{{ do.value }}\">{{ do.label }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n              <button sc-camel-on-click=\"{{ onDailyDayNext }}\" style=\"min-height:44px;min-width:44px;border:1px solid #e4e0d2;background:#fff;border-radius:8px;font-size:16px;cursor:pointer;\">›<\u002Fbutton>\n            <\u002Fdiv>\n            <sc-for list=\"{{ dailyGroupsMobile }}\" as=\"grp\" hint-placeholder-count=\"4\">\n              <div style=\"margin-bottom:16px;\">\n                <div style=\"font-weight:700;font-size:13px;color:#10233a;margin:0 0 8px;font-family:'Source Serif 4',Georgia,serif;\">{{ grp.title }}<\u002Fdiv>\n                <div style=\"display:grid;gap:8px;\">\n                  <sc-for list=\"{{ grp.indicators }}\" as=\"ind\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid #e4e0d2;border-radius:8px;padding:10px 12px;background:#fdfdfb;\">\n                      <span style=\"font-size:13px;font-weight:600;\">{{ ind.name }}<\u002Fspan>\n                      <input type=\"text\" value=\"{{ ind.value }}\" sc-camel-on-change=\"{{ ind.onChange }}\" sc-camel-read-only=\"{{ ind.readOnly }}\" style=\"width:90px;box-sizing:border-box;padding:10px;text-align:center;font-size:14px;border:1px solid #e4e0d2;border-radius:7px;font-family:'JetBrains Mono',monospace;background:#fff;min-height:44px;flex-shrink:0;\">\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n          <p style=\"font-size:12px;color:#8a8570;margin:6px 0 14px;\">One column per calendar day (1–31). Leave unused columns blank for shorter months.<\u002Fp>\n          <sc-for list=\"{{ dailyGroups }}\" as=\"grp\" hint-placeholder-count=\"4\">\n            <div style=\"margin-bottom:18px;\">\n              <div style=\"font-weight:700;font-size:13px;color:#10233a;margin:0 0 8px;font-family:'Source Serif 4',Georgia,serif;\">{{ grp.title }}<\u002Fdiv>\n              <div style=\"overflow-x:auto;\">\n                <sc-raw-table style=\"border-collapse:collapse;font-size:12px;min-width:1500px;\">\n                  <sc-raw-thead><sc-raw-tr>\n                    <sc-raw-th style=\"text-align:left;color:#8a8570;font-weight:700;font-size:10.5px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid #e4e0d2;width:230px;position:sticky;left:0;background:#fff;\">Indicator<\u002Fsc-raw-th>\n                    <sc-for list=\"{{ dayHeaders }}\" as=\"dh\" hint-placeholder-count=\"31\">\n                      <sc-raw-th style=\"text-align:center;color:#8a8570;font-weight:700;font-size:10.5px;padding:6px 4px;border-bottom:1px solid #e4e0d2;border-right:{{ dh.sep }};white-space:nowrap;\">{{ dh.day }}<\u002Fsc-raw-th>\n                    <\u002Fsc-for>\n                  <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n                  <sc-raw-tbody>\n                    <sc-for list=\"{{ grp.indicators }}\" as=\"ind\" hint-placeholder-count=\"4\">\n                      <sc-raw-tr style=\"border-bottom:1px solid #f2f0e6;\">\n                        <sc-raw-td style=\"padding:5px 8px;font-weight:600;font-size:12.5px;white-space:nowrap;position:sticky;left:0;background:#fff;\">{{ ind.name }}<\u002Fsc-raw-td>\n                        <sc-for list=\"{{ ind.days }}\" as=\"d\" hint-placeholder-count=\"31\">\n                          <sc-raw-td style=\"padding:3px 3px;border-right:{{ d.sep }};\"><input type=\"text\" value=\"{{ d.value }}\" sc-camel-on-change=\"{{ d.onChange }}\" sc-camel-read-only=\"{ el)\"],\n    [\"Unemployment Rate (U-3)\",\"Monthly (Level)\"],\n    [\"U-6 Unemployment Rate\",\"Monthly (Level)\"],\n    [\"Labor Force Participation Rate (LFPR)\",\"Monthly (Level)\"],\n    [\"Average Hourly Earnings (AHE)\",\"Monthly (YoY/MoM)\"],\n    [\"ADP National Employment Report\",\"Monthly (Level)\"],\n    [\"JOLTS Job Openings\",\"Monthly (Level)\"],\n    [\"Employment Cost Index (ECI)\",\"Quarterly (QoQ / YoY)\"],\n    [\"Challenger Job Cuts\",\"Monthly (Level)\"],\n    [\"ISM Employment Index\",\"Monthly (Level / MoM Chg)\"],\n    [\"ADP vs NFP Comparison Framework\",\"Qualitative\"],\n  ]},\n  { key:\"inflation\", title:\"Inflation\", indicators:[\n    [\"CPI\",\"Monthly (YoY/MoM)\"],\n    [\"Core CPI\",\"Monthly (YoY/MoM)\"],\n    [\"PPI\",\"Monthly (YoY/MoM)\"],\n    [\"Core PPI\",\"Monthly (YoY/MoM)\"],\n    [\"PCE\",\"Monthly (YoY/MoM)\"],\n    [\"Core PCE\",\"Monthly (YoY/MoM)\"],\n    [\"Trimmed Mean PCE\",\"Monthly (YoY/MoM)\"],\n    [\"Import Price Index\",\"Monthly (YoY/MoM)\"],\n    [\"Shelter Inflation\",\"Monthly (YoY/MoM)\"],\n    [\"Consumer Inflation Expectation\",\"Monthly (Level)\"],\n    [\"CPI vs PCE Framework\",\"Qualitative\"],\n  ]},\n  { key:\"consumer\", title:\"Consumer\", indicators:[\n    [\"Retail Sales\",\"Monthly (YoY/MoM)\"],\n    [\"Core Retail Sales\",\"Monthly (YoY/MoM)\"],\n    [\"Control Group Retail Sales\",\"Monthly (YoY/MoM)\"],\n    [\"Personal Income\",\"Monthly (Level)\"],\n    [\"Personal Spending (PCE)\",\"Monthly (Level)\"],\n    [\"Personal Savings Rate\",\"Monthly (Level)\"],\n    [\"Consumer Confidence Index (Conference Board)\",\"Monthly (Level)\"],\n    [\"University of Michigan Consumer Sentiment\",\"Monthly (Level)\"],\n    [\"Consumer Credit\",\"Monthly (Level)\"],\n    [\"Household Debt Service Ratio (DSR)\",\"Quarterly (QoQ / YoY)\"],\n    [\"Consumer Delinquency Rate\",\"Quarterly (QoQ / YoY)\"],\n  ]},\n  { key:\"monetary_fiscal\", title:\"Monetary & Fiscal Policy\", indicators:[\n    [\"Federal Funds Rate (FFR)\",\"Monthly (Level)\"],\n    [\"FOMC Decision\",\"Qualitative\"],\n    [\"Dot Plot (Median Projection)\",\"Quarterly (FOMC SEP)\"],\n    [\"Federal Reserve Balance Sheet (QE/QT)\",\"Weekly (W1-W4)\"],\n    [\"Reverse Repo Facility (RRP)\",\"See Daily Tracker Section\"],\n    [\"Interest on Reserve Balances (IORB)\",\"Monthly (Level)\"],\n    [\"Discount Rate\",\"Monthly (Level)\"],\n    [\"Forward Guidance (Tone)\",\"Qualitative\"],\n    [\"Government Spending (Federal Outlays)\",\"Monthly (Level)\"],\n    [\"Federal Budget Deficit / Surplus\",\"Monthly (Level)\"],\n    [\"Treasury Issuance\",\"Weekly (W1-W4)\"],\n    [\"Tax Receipts\",\"Monthly (Level)\"],\n    [\"Public Debt Outstanding\",\"See Daily Tracker Section\"],\n    [\"Interest Expense on Federal Debt\",\"Monthly (Level)\"],\n    [\"Fiscal Stimulus\",\"Qualitative\"],\n    [\"Fiscal Austerity\",\"Qualitative\"],\n  ]},\n  { key:\"liquidity\", title:\"Liquidity\", indicators:[\n    [\"Treasury General Account (TGA)\",\"See Daily Tracker Section\"],\n    [\"Bank Reserves\",\"Weekly (W1-W4)\"],\n    [\"Money Supply (U.S. M2)\",\"Weekly (W1-W4)\"],\n    [\"Commercial Bank Credit\",\"Weekly (W1-W4)\"],\n    [\"Repo Market\",\"See Daily Tracker Section\"],\n    [\"Secured Overnight Financing Rate (SOFR)\",\"See Daily Tracker Section\"],\n    [\"Cross-Currency Dollar Liquidity\",\"See Daily Tracker Section\"],\n    [\"Global Central Bank Liquidity\",\"Monthly (Level)\"],\n    [\"Reverse Repo Facility (RRP)\",\"See Daily Tracker Section\"],\n    [\"Federal Reserve Balance Sheet (QE/QT)\",\"Weekly (W1-W4)\"],\n  ]},\n  { key:\"credit\", title:\"Credit\", indicators:[\n    [\"Senior Loan Officer Opinion Survey (SLOOS)\",\"Quarterly\"],\n    [\"Consumer Credit\",\"Monthly (Level)\"],\n    [\"Commercial & Industrial Loans (C&I Loans)\",\"Weekly (W1-W4)\"],\n    [\"Mortgage Credit\",\"Monthly (Level)\"],\n    [\"Credit Spreads\",\"See Daily Tracker Section\"],\n    [\"High Yield Spread (HY OAS)\",\"See Daily Tracker Section\"],\n    [\"Investment Grade Spread\",\"See Daily Tracker Section\"],\n    [\"Corporate Default Rate\",\"Monthly (Level)\"],\n    [\"Delinquency Rate (Aggregate)\",\"Quarterly\"],\n  ]},\n  { key:\"sentiment\", title:\"Market Sentiment\", indicators:[\n    [\"VIX (Volatility Index)\",\"See Daily Tracker Section\"],\n    [\"Put/Call Ratio\",\"See Daily Tracker Section\"],\n    [\"AAII Sentiment Survey\",\"Weekly (W1-W4)\"],\n    [\"AAII Bull-Bear Spread\",\"Weekly (W1-W4)\"],\n    [\"NAAIM Exposure Index\",\"Weekly (W1-W4)\"],\n    [\"CNN Fear & Greed Index\",\"See Daily Tracker Section\"],\n    [\"Commitment of Traders (COT Report)\",\"Weekly (W1-W4)\"],\n    [\"Dealer Positioning (Gamma Exposure)\",\"See Daily Tracker Section\"],\n    [\"Market Breadth\",\"See Daily Tracker Section\"],\n    [\"Fund Flows\",\"Weekly (W1-W4)\"],\n    [\"Financial Conditions Index (FCI)\",\"Weekly (W1-W4)\"],\n    [\"Credit Spreads\",\"See Daily Tracker Section\"],\n    [\"MOVE Index (Bond Volatility)\",\"See Daily Tracker Section\"],\n    [\"Equity Market Valuation Sentiment\",\"Monthly (Level)\"],\n  ]},\n];\n\nconst DAILY_GROUPS = [\n  { key:\"d_monetary\", title:\"Monetary & Fiscal Policy\", indicators:[\"Reverse Repo Facility (RRP)\",\"Public Debt Outstanding\"]},\n  { key:\"d_liquidity\", title:\"Liquidity\", indicators:[\"Treasury General Account (TGA)\",\"Repo Market\",\"Secured Overnight Financing Rate (SOFR)\",\"Cross-Currency Dollar Liquidity\"]},\n  { key:\"d_credit\", title:\"Credit\", indicators:[\"Credit Spreads\",\"High Yield Spread (HY OAS)\",\"Investment Grade Spread\"]},\n  { key:\"d_sentiment\", title:\"Market Sentiment\", indicators:[\"VIX (Volatility Index)\",\"Put/Call Ratio\",\"CNN Fear & Greed Index\",\"Dealer Positioning (Gamma Exposure)\",\"Market Breadth\",\"MOVE Index (Bond Volatility)\"]},\n];\n\nconst MONTHS = [\"January\",\"February\",\"March\",\"April\",\"May\",\"June\",\"July\",\"August\",\"September\",\"October\",\"November\",\"December\"];\nconst APP_PASSWORD = \"12345\";\n\nfunction slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,\"_\").replace(/^_+|_+$/g,\"\"); }\n\nclass Component extends DCLogic {\n  state = {\n    lockInput: \"\", lockError: \"\",\n    year: new Date().getFullYear(), month: new Date().getMonth()+1,\n    entries: {}, qual: {}, daily: {},\n    openChapters: {}, qualOpen: false, mistakeOpen: false, dailyOpen: false,\n    viewingBackup: false, viewingLabel: \"\", savedDraftState: null,\n    saveStatus: \"\", exportMenuOpen: false,\n    dailyDay: new Date().getDate() <= 31 ? new Date().getDate() : 1,\n  };\n\n  componentDidMount() {\n    this.loadPeriod(this.state.year, this.state.month, true);\n    this.mq = window.matchMedia(\"(max-width: 720px)\");\n    const update = () => this.setState({ isMobile: this.mq.matches });\n    this.mq.addEventListener(\"change\", update);\n    update();\n  }\n\n  storageKey(year, month) { return `macro-journal-${year}-${String(month).padStart(2,\"0\")}`; }\n\n  loadPeriod(year, month, skipSet) {\n    const key = this.storageKey(year, month);\n    const raw = localStorage.getItem(key);\n    const data = raw ? JSON.parse(raw) : { entries:{}, qual:{}, daily:{} };\n    this.currentKey = key;\n    this.fileHandle = null;\n    this.setState({ year, month, entries: data.entries||{}, qual: data.qual||{}, daily: data.daily||{}, viewingBackup:false, viewingLabel:\"\" });\n  }\n\n  saveDraft() {\n    localStorage.setItem(this.currentKey, JSON.stringify({ entries: this.state.entries, qual: this.state.qual, daily: this.state.daily }));\n  }\n\n  onEntryChange(id, field, value) {\n    const entries = { ...this.state.entries, [id]: { ...(this.state.entries[id]||{}), [field]: value } };\n    this.setState({ entries }, () => this.saveDraft());\n  }\n\n  onDailyChange(id, day, value) {\n    const daily = { ...this.state.daily, [id]: { ...(this.state.daily[id]||{}), [day]: value } };\n    this.setState({ daily }, () => this.saveDraft());\n  }\n\n  onQualField(field, value) {\n    const qual = { ...this.state.qual, [field]: value };\n    this.setState({ qual }, () => this.saveDraft());\n  }\n\n  toggleChapter(key) {\n    this.setState({ openChapters: { ...this.state.openChapters, [key]: !this.state.openChapters[key] } });\n  }\n\n  expandAll() {\n    const o = {};\n    CHAPTERS.forEach(c => o[c.key] = true);\n    this.setState({ openChapters: o, qualOpen: true, mistakeOpen: true, dailyOpen: true });\n  }\n\n  collapseAll() {\n    this.setState({ openChapters: {}, qualOpen: false, mistakeOpen: false, dailyOpen: false });\n  }\n\n  openNoteLink(id) {\n    const link = (this.state.entries[id] && this.state.entries[id].notes) || \"\";\n    if (!link) { this.editNoteLink(id); return; }\n    window.open(link, \"_blank\");\n  }\n\n  editNoteLink(id) {\n    const link = (this.state.entries[id] && this.state.entries[id].notes) || \"\";\n    const val = prompt(\"Paste or edit the link:\", link);\n    if (val !== null) this.onEntryChange(id, \"notes\", val.trim());\n  }\n\n  flashStatus(msg) {\n    this.setState({ saveStatus: msg });\n    setTimeout(() => this.setState({ saveStatus: \"\" }), 4000);\n  }\n\n  startNewEntry() {\n    if (!confirm(\"This clears everything currently on screen (without saving a file). Continue?\")) return;\n    localStorage.removeItem(this.currentKey);\n    this.fileHandle = null;\n    this.setState({ entries:{}, qual:{}, daily:{} });\n    this.flashStatus(\"Cleared — ready for new entry\");\n  }\n\n  async downloadOrWriteFile() {\n    const filename = this.currentKey + \".json\";\n    const content = JSON.stringify({ entries: this.state.entries, qual: this.state.qual, daily: this.state.daily }, null, 2);\n    if (window.showSaveFilePicker) {\n      try {\n        if (!this.fileHandle || this.fileHandle.name !== filename) {\n          this.fileHandle = await window.showSaveFilePicker({ suggestedName: filename, types: [{ description: \"Journal backup\", accept: { \"application/json\": [\".json\"] } }] });\n        }\n        const writable = await this.fileHandle.createWritable();\n        await writable.write(content);\n        await writable.close();\n        return;\n      } catch (err) {}\n    }\n    const blob = new Blob([content], { type: \"application/json\" });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url; a.download = filename; a.click();\n    URL.revokeObjectURL(url);\n  }\n\n  async saveAll() {\n    await this.downloadOrWriteFile();\n    localStorage.removeItem(this.currentKey);\n    this.fileHandle = null;\n    this.setState({ entries:{}, qual:{}, daily:{} });\n    this.flashStatus(\"Saved & cleared \" + new Date().toLocaleTimeString());\n  }\n\n  exportJSON() {\n    const content = JSON.stringify({ entries: this.state.entries, qual: this.state.qual, daily: this.state.daily }, null, 2);\n    const blob = new Blob([content], { type: \"application/json\" });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url; a.download = this.currentKey + \".json\"; a.click();\n    URL.revokeObjectURL(url);\n  }\n\n  toggleExportMenu() { this.setState({ exportMenuOpen: !this.state.exportMenuOpen }); }\n\n  exportPDF() {\n    this.setState({ exportMenuOpen: false });\n    setTimeout(() => window.print(), 50);\n  }\n\n  exportExcel() {\n    this.setState({ exportMenuOpen: false });\n    const s = this.state;\n    let rows = \"\";\n    CHAPTERS.forEach(ch => {\n      rows += `<tr><td colspan=\"6\" style=\"background:#10233a;color:#fff;font-weight:bold;padding:6px;\">${ch.title}<\u002Ftd><\u002Ftr>`;\n      rows += `<tr><th>Indicator<\u002Fth><th>Frequency<\u002Fth><th>Entry 1<\u002Fth><th>Entry 2<\u002Fth><th>Entry 3<\u002Fth><th>Entry 4<\u002Fth><th>Link<\u002Fth><\u002Ftr>`;\n      ch.indicators.forEach(([name, freq]) => {\n        const id = ch.key + \"__\" + slug(name);\n        const e = s.entries[id] || {};\n        rows += `<tr><td>${name}<\u002Ftd><td>${freq}<\u002Ftd><td>${e.e1||\"\"}<\u002Ftd><td>${e.e2||\"\"}<\u002Ftd><td>${e.e3||\"\"}<\u002Ftd><td>${e.e4||\"\"}<\u002Ftd><td>${e.notes||\"\"}<\u002Ftd><\u002Ftr>`;\n      });\n    });\n    rows += `<tr><td colspan=\"7\" style=\"background:#10233a;color:#fff;font-weight:bold;padding:6px;\">Macro Conclusion<\u002Ftd><\u002Ftr>`;\n    rows += `<tr><td>Current Phase<\u002Ftd><td colspan=\"6\">${s.qual.phase||\"\"}<\u002Ftd><\u002Ftr>`;\n    rows += `<tr><td>Main Risk<\u002Ftd><td colspan=\"6\">${s.qual.risk||\"\"}<\u002Ftd><\u002Ftr>`;\n    rows += `<tr><td>Main Opportunity<\u002Ftd><td colspan=\"6\">${s.qual.opportunity||\"\"}<\u002Ftd><\u002Ftr>`;\n    rows += `<tr><td>Mistake Log<\u002Ftd><td colspan=\"6\">${s.qual.mistakeLog||\"\"}<\u002Ftd><\u002Ftr>`;\n    const html = `<html><head><meta charset=\"UTF-8\"><\u002Fhead><body><table border=\"1\">${rows}<\u002Ftable><\u002Fbody><\u002Fhtml>`;\n    const blob = new Blob([html], { type: \"application/vnd.ms-excel\" });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url; a.download = this.currentKey + \".xls\"; a.click();\n    URL.revokeObjectURL(url);\n  }\n\n  importJSONPrompt() {\n    const input = document.createElement(\"input\");\n    input.type = \"file\"; input.accept = \"application/json\";\n    input.onchange = () => {\n      const file = input.files[0];\n      if (!file) return;\n      const reader = new FileReader();\n      reader.onload = () => {\n        try {\n          const imported = JSON.parse(reader.result);\n          this.savedDraftState = { entries: this.state.entries, qual: this.state.qual, daily: this.state.daily };\n          this.setState({ entries: imported.entries||{}, qual: imported.qual||{}, daily: imported.daily||{}, viewingBackup: true, viewingLabel: file.name });\n        } catch (e) {\n          alert(\"Couldn't read that file — make sure it's a backup exported from this journal.\");\n        }\n      };\n      reader.readAsText(file);\n    };\n    input.click();\n  }\n\n  returnToCurrentEntry() {\n    const d = this.savedDraftState || { entries:{}, qual:{}, daily:{} };\n    this.savedDraftState = null;\n    this.setState({ entries: d.entries, qual: d.qual, daily: d.daily, viewingBackup:false, viewingLabel:\"\" });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const readOnly = s.viewingBackup;\n    const mob = !!s.isMobile;\n\n    const chapters = CHAPTERS.map((ch, i) => {\n      const indicators = ch.indicators.map(([name, freq]) => {\n        const id = ch.key + \"__\" + slug(name);\n        const e = s.entries[id] || {};\n        return {\n          id, name, freq,\n          e1: e.e1||\"\", e2: e.e2||\"\", e3: e.e3||\"\", e4: e.e4||\"\", notes: e.notes||\"\",\n          pinColor: e.notes ? \"#c8963e\" : \"#b8b3a0\",\n          readOnly,\n          onE1: (ev)=>this.onEntryChange(id,\"e1\",ev.target.value),\n          onE2: (ev)=>this.onEntryChange(id,\"e2\",ev.target.value),\n          onE3: (ev)=>this.onEntryChange(id,\"e3\",ev.target.value),\n          onE4: (ev)=>this.onEntryChange(id,\"e4\",ev.target.value),\n          onOpenLink: ()=>this.openNoteLink(id),\n          onEditLink: ()=>this.editNoteLink(id),\n        };\n      });\n      const filled = indicators.filter(ind => ind.e1||ind.e2||ind.e3||ind.e4||ind.notes).length;\n      const isOpen = !!s.openChapters[ch.key];\n      return {\n        key: ch.key, title: ch.title, indicators, isOpen,\n        index: String(i+1).padStart(2,\"0\"),\n        progressLabel: `${filled}/${indicators.length} filled`,\n        arrowGlyph: isOpen ? \"▾\" : \"▸\",\n        onToggle: ()=>this.toggleChapter(ch.key),\n      };\n    });\n\n    const totalIndicators = chapters.reduce((a,c)=>a+c.indicators.length,0);\n    const totalFilled = chapters.reduce((a,c)=>a+c.indicators.filter(ind=>ind.e1||ind.e2||ind.e3||ind.e4||ind.notes).length,0);\n\n    const dailyGroups = DAILY_GROUPS.map(grp => ({\n      title: grp.title,\n      indicators: grp.indicators.map(name => {\n        const id = grp.key + \"__\" + slug(name);\n        const rec = s.daily[id] || {};\n        const days = [];\n        for (let d=1; d<=31; d++) {\n          days.push({ day:d, value: rec[d]||\"\", sep: (d%7===0 ? \"2px solid #e4e0d2\" : \"1px solid #f2f0e6\"), onChange:(ev)=>this.onDailyChange(id,d,ev.target.value) });\n        }\n        return { name, readOnly, days };\n      }),\n    }));\n\n    const dayHeaders = [];\n    for (let d=1; d<=31; d++) dayHeaders.push({ day:d, sep: (d%7===0 ? \"2px solid #e4e0d2\" : \"1px solid #f2f0e6\") });\n\n    const dailyDay = s.dailyDay;\n    const dailyDayOptions = Array.from({length:31},(_,i)=>({value:i+1,label:\"Day \"+(i+1)}));\n    const dailyGroupsMobile = DAILY_GROUPS.map(grp => ({\n      title: grp.title,\n      indicators: grp.indicators.map(name => {\n        const id = grp.key + \"__\" + slug(name);\n        const rec = s.daily[id] || {};\n        return { name, readOnly, value: rec[dailyDay]||\"\", onChange: (ev)=>this.onDailyChange(id,dailyDay,ev.target.value) };\n      }),\n    }));\n\n    return {\n      headerPadding: mob ? \"20px 16px\" : \"30px 44px\",\n      headerTitleSize: mob ? \"24px\" : \"34px\",\n      headerNameSize: mob ? \"14px\" : \"17px\",\n      avatarSize: mob ? \"40px\" : \"56px\",\n      toolbarPadding: mob ? \"10px 12px\" : \"14px 44px\",\n      contentPadding: mob ? \"16px 12px 60px\" : \"30px 36px 90px\",\n      chapterHeadPadding: mob ? \"13px 14px\" : \"17px 24px\",\n      isMobile: mob, isDesktop: !mob,\n      toolbarOuterWrap: mob ? \"wrap\" : \"nowrap\",\n      toolbarInnerWrap: mob ? \"wrap\" : \"nowrap\",\n      toolbarInnerOverflow: mob ? \"visible\" : \"auto\",\n      toolbarInnerFlex: mob ? \"1 1 100%\" : \"1\",\n      todayLabel: new Date().toLocaleDateString(undefined, { year:\"numeric\", month:\"long\", day:\"numeric\" }),\n      periodLabel: `${MONTHS[s.month-1]} ${s.year}`,\n      overallProgressLabel: `${totalFilled}/${totalIndicators} indicators logged`,\n      month: s.month, year: s.year,\n      monthOptions: MONTHS.map((m,i)=>({value:i+1,label:m})),\n      yearOptions: Array.from({length:12},(_,i)=>s.year-2+i).map(y=>({value:y,label:String(y)})),\n      onMonthChange: (ev)=>this.loadPeriod(s.year, parseInt(ev.target.value)),\n      onYearChange: (ev)=>this.loadPeriod(parseInt(ev.target.value), s.month),\n\n      saveStatus: s.saveStatus,\n      expandAll: ()=>this.expandAll(),\n      collapseAll: ()=>this.collapseAll(),\n      startNewEntry: ()=>this.startNewEntry(),\n      exportJSON: ()=>this.exportJSON(),\n      importJSONPrompt: ()=>this.importJSONPrompt(),\n      saveAll: ()=>this.saveAll(),\n      exportMenuOpen: s.exportMenuOpen,\n      toggleExportMenu: ()=>this.toggleExportMenu(),\n      exportPDF: ()=>this.exportPDF(),\n      exportExcel: ()=>this.exportExcel(),\n\n      viewingBackup: s.viewingBackup, viewingLabel: s.viewingLabel,\n      returnToCurrentEntry: ()=>this.returnToCurrentEntry(),\n\n      chapters,\n\n      qualOpen: s.qualOpen, qualArrowGlyph: s.qualOpen ? \"▾\" : \"▸\",\n      onToggleQual: ()=>this.setState({qualOpen: !s.qualOpen}),\n      qualPhase: s.qual.phase||\"\", qualRisk: s.qual.risk||\"\", qualOpportunity: s.qual.opportunity||\"\",\n      onQualPhaseChange: (ev)=>this.onQualField(\"phase\", ev.target.value),\n      onQualRiskChange: (ev)=>this.onQualField(\"risk\", ev.target.value),\n      onQualOpportunityChange: (ev)=>this.onQualField(\"opportunity\", ev.target.value),\n      readOnlyBackup: readOnly,\n\n      mistakeOpen: s.mistakeOpen, mistakeArrowGlyph: s.mistakeOpen ? \"▾\" : \"▸\",\n      onToggleMistake: ()=>this.setState({mistakeOpen: !s.mistakeOpen}),\n      mistakeLog: s.qual.mistakeLog||\"\",\n      onMistakeChange: (ev)=>this.onQualField(\"mistakeLog\", ev.target.value),\n\n      dailyOpen: s.dailyOpen, dailyArrowGlyph: s.dailyOpen ? \"▾\" : \"▸\",\n      onToggleDaily: ()=>this.setState({dailyOpen: !s.dailyOpen}),\n      dailyGroups, dayHeaders,\n      dailyDay, dailyDayOptions, dailyGroupsMobile,\n      onDailyDayChange: (ev)=>this.setState({dailyDay: parseInt(ev.target.value)}),\n      onDailyDayPrev: ()=>this.setState({dailyDay: Math.max(1, s.dailyDay-1)}),\n      onDailyDayNext: ()=>this.setState({dailyDay: Math.min(31, s.dailyDay+1)}),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
